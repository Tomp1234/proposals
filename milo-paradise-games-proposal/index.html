<style>
  :root {
    --font-sans: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-serif: 'Newsreader', Georgia, serif;
    --accent: #AA170F;
    --rgb: 170, 23, 15;
  }
  html, body { background: #000; }
  body { font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }

  @keyframes orbDrift {
    0%,100% { transform: scale(1) translate(0,0); }
    40%     { transform: scale(1.1) translate(25px,-18px); }
    70%     { transform: scale(.93) translate(-12px,22px); }
  }
  @keyframes drift {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    8%   { opacity: 1; }
    90%  { opacity: .4; }
    100% { transform: translateY(-110vh) translateX(var(--drift)); opacity: 0; }
  }
  @keyframes scan {
    0%   { top: -1px; opacity: 0; }
    4%   { opacity: 1; }
    96%  { opacity: .7; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes ticker  { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes shimmer { 0% { transform: translateX(-150%) skewX(-18deg); } 100% { transform: translateX(250%) skewX(-18deg); } }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 24px rgba(var(--rgb),.55), 0 0 60px rgba(var(--rgb),.25); }
    50%     { box-shadow: 0 0 42px rgba(var(--rgb),.9),  0 0 100px rgba(var(--rgb),.45); }
  }
  @keyframes borderGlow {
    0%,100% { border-color: rgba(var(--rgb),.25); }
    50%     { border-color: rgba(var(--rgb),.65); }
  }
  @keyframes typeDot {
    0%,80%,100% { transform: scale(0); opacity: .3; }
    40%         { transform: scale(1); opacity: 1; }
  }
  @keyframes typeCursor { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes msgSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes flowDot {
    0%   { left: 0%;   opacity: 0; }
    3%   { opacity: 1; }
    97%  { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }
  @keyframes lgFloat1 {
    0%,100% { transform: translateY(0)    rotate(-3deg); }
    50%     { transform: translateY(-14px) rotate(3deg); }
  }
  @keyframes lgFloat2 {
    0%,100% { transform: translateY(-8px) rotate(2deg); }
    50%     { transform: translateY(8px)  rotate(-2deg); }
  }
  @keyframes lgFloat3 {
    0%,100% { transform: translateY(4px)  rotate(-2deg); }
    50%     { transform: translateY(-10px) rotate(4deg); }
  }
  @keyframes slideCard {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .particle { position: absolute; border-radius: 50%; animation: drift var(--dur) var(--delay) infinite ease-in; }
  .q-item   { transition: all .2s ease; }
  .q-item:hover { background: rgba(0,0,0,.04) !important; }
  .btn-glow { animation: glow 2.8s ease-in-out infinite; transition: transform .2s ease; }
  .btn-glow:hover { transform: scale(1.05); }
  .tag-pill { animation: borderGlow 3s ease-in-out infinite; }
  .msg-in   { animation: msgSlide .35s ease forwards; }
  .cursor   { display: inline-block; width: 2px; height: .9em; vertical-align: middle;
              background: currentColor; animation: typeCursor 1s step-end infinite; margin-left: 2px; }

  .serif { font-family: var(--font-serif); font-weight: 400; letter-spacing: -0.02em; }

  /* Mobile-friendly tweaks */
  @media (max-width: 768px) {
    .hero-grid { grid-template-columns: 1fr !important; gap: 2rem !important; }
    .demo-grid { grid-template-columns: 1fr !important; }
    .demo-questions { grid-column: span 1 !important; }
    .demo-laptop { grid-column: span 1 !important; }
    .solution-grid, .case-grid, .options-grid { grid-template-columns: 1fr !important; }
    .compare-table { font-size: 11px; }
    .compare-table .col-sub { display: none; }
    .h1-hero { font-size: 36px !important; }
    .h2-section { font-size: 32px !important; }
    .nav-prepared { display: none; }
    .metrics-grid { grid-template-columns: 1fr !important; gap: 1.5rem; }
    .metrics-grid > div { border-right: none !important; padding: 0 !important; }
    .metrics-grid > div + div { border-top: 1px solid rgba(0,0,0,.08); padding-top: 1.5rem !important; }
  }
</style>

function textOn(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? "#000000" : "#ffffff";
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ─── Chart renderers (return HTML strings) ───────────────────────────────────
function barViz(data) {
  return `<div class="space-y-2.5 pt-1">` + data.map((d,i)=>`
    <div>
      <div class="flex justify-between items-center mb-1">
        <span class="text-gray-400 text-xs truncate pr-2">${esc(d.label)}</span>
        <span class="text-xs font-bold flex-shrink-0" style="color:${d.positive?'#4ade80':'#f87171'}">${esc(d.delta)}</span>
      </div>
      <div class="h-1.5 rounded-full overflow-hidden" style="background-color:rgba(255,255,255,.07)">
        <div class="h-full rounded-full" style="width:${d.pct}%; background-color:${d.positive?accent:'#f87171'}; opacity:.85; transition: width 1s cubic-bezier(.16,1,.3,1) ${i*120}ms;"></div>
      </div>
    </div>`).join('') + `</div>`;
}

function lineViz(points) {
  const W = 260, H = 70;
  const min = Math.min(...points), max = Math.max(...points);
  const xs = points.map((_,i)=>(i/(points.length-1))*W);
  const ys = points.map(p => H - ((p - min) / (max - min + 1)) * (H - 12) - 6);
  const d = xs.map((x,i)=>`${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
  return `
    <div class="pt-1">
      <div class="flex justify-between text-xs text-gray-600 mb-1">
        <span>Trend (indexed)</span>
        <span style="color:${accent}">10 weeks</span>
      </div>
      <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible; max-width:100%">
        <defs>
          <linearGradient id="lg-${Date.now()}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${accent}" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="${accent}" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${d} L${W},${H} L0,${H} Z" fill="${accent}" fill-opacity="0.15"/>
        <path d="${d}" fill="none" stroke="${accent}" stroke-width="2" stroke-linecap="round"/>
        ${xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="2.5" fill="${accent}"/>`).join('')}
      </svg>
      <div class="flex justify-between mt-1">
        <span class="text-gray-700 text-xs">Wk 1</span>
        <span class="text-gray-700 text-xs">Wk 10</span>
      </div>
    </div>`;
}

function funnelViz(data) {
  return `<div class="space-y-2 pt-1">` + data.map((d,i)=>`
    <div class="flex items-center gap-3">
      <div class="flex-1">
        <div class="flex justify-between mb-1">
          <span class="text-gray-400 text-xs">${esc(d.label)}</span>
          <span class="text-xs font-bold text-white">${esc(d.value)}</span>
        </div>
        <div class="h-2 rounded-full overflow-hidden" style="background-color:rgba(255,255,255,.07)">
          <div class="h-full rounded-full" style="width:${d.pct}%; background-color:${accent}; opacity:${1 - i*0.25}; transition: width 1s cubic-bezier(.16,1,.3,1) ${i*150}ms;"></div>
        </div>
      </div>
    </div>`).join('') + `</div>`;
}

function statusViz(data) {
  return `<div class="space-y-1.5 pt-1">` + data.map((d,i)=>`
    <div class="flex items-center justify-between rounded-lg px-3 py-2" style="background-color:rgba(255,255,255,.04)">
      <div class="flex items-center gap-2">
        <div class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background-color:${d.status==='ready'?'#4ade80':'#fbbf24'}"></div>
        <span class="text-gray-300 text-xs">${esc(d.source)}</span>
      </div>
      <span class="text-xs" style="color:${d.status==='ready'?'#4ade80':'#fbbf24'}">${esc(d.detail)}</span>
    </div>`).join('') + `</div>`;
}

function tableViz(data) {
  return `
    <div class="rounded-lg overflow-hidden border" style="border-color:rgba(255,255,255,.07)">
      <table class="w-full text-xs">
        <thead>
          <tr style="background-color:rgba(255,255,255,.04)">
            <th class="text-left px-3 py-2 text-gray-500 font-medium">Task</th>
            <th class="text-right px-3 py-2 text-gray-500 font-medium">Ownership</th>
            <th class="text-right px-3 py-2 text-gray-500 font-medium">Action</th>
          </tr>
        </thead>
        <tbody>
          ${data.map((row)=>`
            <tr style="border-top:1px solid rgba(255,255,255,.04)">
              <td class="px-3 py-2 text-gray-400">${esc(row.a)}${row.b ? ' / ' + esc(row.b) : ''}</td>
              <td class="px-3 py-2 text-right font-bold" style="color:${row.overlap.startsWith('→')?'#4ade80':'#fbbf24'}">${esc(row.overlap)}</td>
              <td class="px-3 py-2 text-right text-gray-500">${esc(row.action)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderChart(resp) {
  switch (resp.type) {
    case 'bar':    return barViz(resp.barData);
    case 'line':   return lineViz(resp.linePoints);
    case 'funnel': return funnelViz(resp.funnelData);
    case 'status': return statusViz(resp.statusData);
    case 'table':  return tableViz(resp.tableData);
    default: return '';
  }
}

      </div>
    </div>
  </section>

  <!-- ═══════════ DEPLOYMENT OPTIONS + PROOF ═══════════ -->
  <section class="bg-white px-6 py-24">

            <span class="text-xs font-bold uppercase tracking-widest px-2.5 py-1 rounded" style="background-color:${accent}; color:${accentText}">On-premise / Private cloud</span>
          </div>
          <p class="text-xs font-semibold mb-3" style="color:${accent}">Recommended for ${esc(brand.clientName)}</p>
          <p class="text-gray-600 text-sm leading-relaxed">Milo lives inside your own infrastructure. No data leaves. Full control. No vendor lock-in.</p>
        </div>
        <div class="rounded-2xl p-7 border-2 hover:shadow-lg transition-shadow duration-300" style="border-color:#e5e7eb">
          <div class="mb-3">
            <span class="text-xs font-bold uppercase tracking-widest px-2.5 py-1 rounded" style="background-color:#f4f4f5; color:#6b7280">Hosted</span>
          </div>
          <p class="text-gray-600 text-sm leading-relaxed">We manage the infrastructure. Fastest time to value for pilots and smaller teams.</p>
        </div>
      </div>

      <div class="relative rounded-2xl p-10 overflow-hidden" style="background-color:#050505">
        <div class="absolute inset-0 pointer-events-none" style="background-image:${GRAIN}; opacity:.5;"></div>
        <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse 50% 120% at 0% 50%, rgba(${rgb},.14) 0%, transparent 60%);"></div>
        <div class="relative z-10">
          <p class="text-xs font-bold uppercase tracking-[0.2em] mb-5" style="color:${accent}">Proof it works</p>
          <p class="text-2xl xl:text-3xl text-white mb-5 leading-snug serif" style="font-style:italic">&ldquo;${esc(content.relevantCaseStudy.result)}&rdquo;</p>
          <p class="text-gray-600 text-sm">${esc(content.relevantCaseStudy.company)}</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══════════ PRICING ═══════════ -->
  <div style="height:1px; background: linear-gradient(90deg, transparent, rgba(${rgb},.4) 30%, rgba(${rgb},.6) 50%, rgba(${rgb},.4) 70%, transparent);"></div>
  <section class="relative bg-black px-6 py-24 overflow-hidden">
    <div class="absolute inset-0 pointer-events-none" style="background-image:${GRAIN}; opacity:.4;"></div>
    <div class="max-w-5xl mx-auto relative z-10">
      <div class="flex items-center gap-4 mb-3 flex-wrap">
        <img src="${brand.logoUrl}" alt="${esc(brand.clientName)}" class="h-8 object-contain" style="filter:brightness(0) invert(1)"/>
        <h2 class="h2-section text-5xl xl:text-6xl text-white serif">The offer for ${esc(brand.clientName)}.</h2>
      </div>
      <p class="text-gray-600 mb-12">Recommended based on your team's needs.</p>

      <div class="rounded-2xl p-10 relative overflow-hidden" style="border:1.5px solid ${accent}; box-shadow: 0 0 0 1px ${accent}22, 0 0 40px ${accent}40, 0 0 80px ${accent}20, 0 8px 40px rgba(0,0,0,0.5); transform: scale(1.02);">
        <div class="absolute top-0 left-0 right-0 h-px" style="background:linear-gradient(90deg, transparent, ${accent}, transparent);"></div>
        <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse 90% 60% at 50% 0%, ${accent}22 0%, transparent 65%);"></div>

root.innerHTML = html;

// ─── Animate hero bars ───────────────────────────────────────────────────────
requestAnimationFrame(() => {
  setTimeout(() => {
    document.querySelectorAll('.hero-bar').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 900);
});

// ─── Interactive picker ──────────────────────────────────────────────────────
const questions = content.clientQuestions;
const responses = content.demoResponses;
let activeQ = 0;
let phase = 'answered'; // 'typing' | 'answered'
let typingTimer = null;
let autoTimer = null;

function paintQuestions() {
  document.querySelectorAll('#qList button').forEach((btn, i) => {
    const active = i === activeQ;
    btn.style.backgroundColor = active ? `rgba(${rgb},.08)` : 'rgba(0,0,0,.02)';
    btn.style.borderColor     = active ? `rgba(${rgb},.35)` : 'rgba(0,0,0,.07)';
    btn.querySelector('.q-num').style.color  = active ? accent : 'rgba(0,0,0,.2)';
    btn.querySelector('.q-cat').style.color  = active ? accent : 'rgba(0,0,0,.3)';
    btn.querySelector('.q-text').style.color = active ? '#111111' : 'rgba(0,0,0,.45)';
  });
}

function renderAnswer() {
  const resp = responses[activeQ] || responses[0];
  const userMsgText = document.getElementById('userMsgText');
  const typing = document.getElementById('typingIndicator');
  const answer = document.getElementById('answerBlock');
  const answerText = document.getElementById('answerText');
  const answerChart = document.getElementById('answerChart');

  userMsgText.textContent = questions[activeQ].question;

  if (phase === 'typing') {
    typing.style.display = 'flex';
    answer.style.display = 'none';
  } else {
    typing.style.display = 'none';
    answer.style.display = 'block';
    // retrigger msg-in animation
    answer.style.animation = 'none';
    void answer.offsetWidth;
    answer.style.animation = '';
    answerText.textContent = resp.text;
    answerChart.innerHTML = renderChart(resp);
  }
}

function pick(i, opts = {}) {
  if (i === activeQ && phase === 'answered' && !opts.force) return;
  clearTimeout(typingTimer);
  clearTimeout(autoTimer);

  activeQ = i;
  phase = 'typing';
  paintQuestions();
  renderAnswer();

  typingTimer = setTimeout(() => {
    phase = 'answered';
    renderAnswer();
    autoTimer = setTimeout(() => pick((activeQ + 1) % questions.length), 6500);
  }, 1100);
}

document.querySelectorAll('#qList button').forEach(btn => {
  btn.addEventListener('click', () => pick(parseInt(btn.dataset.idx, 10)));
});

// Initial render: skip typing, show first answer directly, then start cycle
paintQuestions();
phase = 'answered';
renderAnswer();
autoTimer = setTimeout(() => pick((activeQ + 1) % questions.length), 6500);
</script>
